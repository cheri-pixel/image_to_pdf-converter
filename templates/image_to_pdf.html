<!DOCTYPE html>

<html>

<head>

    <title>Image to PDF</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <div class="container">

        <h1>Convert Images to PDF</h1>

        <form
            action="/convert"
            method="POST"
            enctype="multipart/form-data"
        >

            <input
                type="file"
                name="images"
                multiple
                required
            >

            <br><br><br>

            <button type="submit">

                Convert to PDF

            </button>

        </form>

        <br><br>

        <a href="/" class="home-btn">

            Back to Home

        </a>

    </div>

</body>

</html>
