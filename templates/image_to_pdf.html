<!DOCTYPE html>
<html>

<head>
    <title>Image to PDF</title>
     <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

    <div class="container">

        <h1>Convert Images to PDF</h1>

    <hr>

    <form
        action="/convert"
        method="post"
        enctype="multipart/form-data"
    >

        <input
            type="file"
            name="images"
            multiple
            required
        >

        <br><br>

        <button type="submit">
            Convert to PDF
        </button>

    </form>

    <br><br>

    <a href="/">

        <button>
            Back to Home
        </button>

    </a>

</body>

</html>
